<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Vuelos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <form id="loginForm" class="login-form">
            <h2>SISTEMA PARA LA GESTION DE VUELOS</h2>
            <p>Ingresa a tu cuenta para gestionar vuelos</p>
            
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@correo.com">
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" id="loginBtn">Iniciar Sesión</button>
            
            <div id="message" class="message"></div>
            
            <a href="/public/password/forgot-password.html" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </form>
    </div>

    <script src="auth.js"></script>
</body>
</html>
