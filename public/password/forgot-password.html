<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Recuperar Contraseña</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div class="login-container">
      <form id="forgotForm" class="login-form">
        <h2>Recuperación</h2>
        <p>Ingresa tu correo para enviarte un código de acceso.</p>

        <div class="input-group">
          <label>Correo Electrónico</label>
          <input
            type="email"
            id="email"
            required
            placeholder="ejemplo@correo.com"
          />
        </div>

        <button type="submit" id="forgotBtn">Enviar token</button>
        <div>
          <a href="reset-password.html">ir a cambiar contraseña</a>
        </div>
        <div id="message" class="message"></div>
        <a href="/public/index.html" class="forgot-link">Volver al Login</a>
      </form>
    </div>

    <script>
      document
        .getElementById("forgotForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("email").value;
          const btn = document.getElementById("forgotBtn");
          const msg = document.getElementById("message");

          btn.disabled = true;
          msg.innerText = "Procesando...";

          try {
            const response = await fetch("/forgot-password", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email }),
            });

            const data = await response.json();
            msg.style.color = response.ok ? "#2ecc71" : "#e74c3c";
            msg.innerText = data.message || data.error;

            // Si estuviéramos en desarrollo, podrías imprimir el token aquí
            console.log("Respuesta del servidor:", data);
            if (data.debug_token) {
              console.log("Token generado (Simulación):", data.debug_token);
              alert("Simulación de correo: El token es " + data.debug_token);
            }
          } catch (err) {
            msg.innerText = "Error en el servidor.";
          } finally {
            btn.disabled = false;
          }
        });
    </script>
  </body>
</html>
